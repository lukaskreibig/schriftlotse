name: Modelladapter

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  adapters:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "latest"
          enable-cache: true
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: uv sync --frozen --extra models --extra dev
      - run: uv run party --help
      - run: uv run orli --help
      - run: uv run python -c "from transformers import TrOCRProcessor, VisionEncoderDecoderModel"
      - run: uv run pytest
