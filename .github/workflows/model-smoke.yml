name: Modelladapter

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  adapters:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "latest"
          enable-cache: true
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: uv sync --frozen --extra models --extra dev
      - run: uv run party --help
      - run: uv run orli --help
      - run: uv run python -c "from transformers import TrOCRProcessor, VisionEncoderDecoderModel"
      - run: uv run pytest
