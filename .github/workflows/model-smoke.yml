name: Modelladapter

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  adapters:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "latest"
          enable-cache: true
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: uv sync --frozen --extra models --extra dev
      - run: uv run party --help
      - run: uv run orli --help
      - run: uv run python -c "from transformers import TrOCRProcessor, VisionEncoderDecoderModel"
      - run: uv run pytest
