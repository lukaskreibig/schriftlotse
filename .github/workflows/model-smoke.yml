name: Modelladapter

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  adapters:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "latest"
          enable-cache: true
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: uv sync --frozen --extra models --extra dev
      - run: uv run party --help
      - run: uv run orli --help
      - run: uv run python -c "from transformers import TrOCRProcessor, VisionEncoderDecoderModel"
      - run: uv run pytest
